<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <title>Stadion Start - SPA Menü</title>
    <style>
        :root{
            --elsodlegesszin: #0f0c29;
            --masodlagosszin: #48868a;
            --szovegszin: #333;
            --hatterszin: #f8f9fa;
            --kszin: #1a1a1a;
        }

        body{
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--hatterszin);
            margin: 0;
            padding: 0;
            color: var(--szovegszin);
            display: grid;
            grid-template-rows: auto auto 1fr auto; 
            min-height: 100vh;
        }

        header{
            background: linear-gradient(90deg, #0f0c29, #302b63, #24243e);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.3);
            border-bottom: 2px solid var(--masodlagosszin);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--masodlagosszin);
        }

        nav {
            background-color: rgba(26, 26, 26, 0.95);
            padding: 1.2rem;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }

        nav a {
            text-decoration: none;
            color: var(--masodlagosszin);
            padding: 8px 20px;
            border: 1px solid var(--masodlagosszin);
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.4s ease;
        }

        nav a:hover, nav a.active {
            background-color: var(--masodlagosszin);
            color: #000;
            box-shadow: 0 0 15px var(--masodlagosszin);
        }

        main {
            flex: 1;
            max-width: 1000px;
            margin: 3rem auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        h2 {
            color: var(--elsodlegesszin);
            border-bottom: 2px solid var(--masodlagosszin);
            padding-bottom: 10px;
            display: inline-block;
        }

        .button-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            z-index: 100;
        }

        button {
            background: var(--elsodlegesszin);
            color: white;
            border: 1px solid var(--masodlagosszin);
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--masodlagosszin);
            color: #000;
            box-shadow: 0 0 10px var(--masodlagosszin);
        }

       #appFrame { 
            width: 100%;
            height: 500px;
            border: 2px solid var(--elsodlegesszin);
            border-radius: 8px;
            position: relative;
            z-index: 1;         
        }

        footer {
            background-color: #000;
            color: #666;
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #222;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid var(--elsodlegesszin);
            border-radius: 8px;
            background: #0f0c29;
            overflow: hidden;
        }
        
    </style>
</head>
<body>

<header>
    <h1>Web programozás-1 SPA Alkalmazás</h1>
</header>

<nav>
    <a href="index.html">Főoldal</a>
    <a href="javascript.html">JavaScript CRUD</a>
    <a href="react.html">React CRUD</a>
    <a class="active" href="spa.html">SPA Menü</a>
    <a href="fetchapi.html">Fetch API</a>
    <a href="axios.html">Axios Menü</a>
    <a href="oojs.html">OOJS Menü</a>
</nav>

<main>
    <h2>Interaktív Alkalmazások</h2>
    <p>Válassz egy modult az alábbi gombokkal!</p>

    <div class="button-container">
        <button onclick="loadApp('mem')">⚽ Memóriajáték</button>
        <button onclick="loadApp('ttt')">🎮 Tic‑Tac‑Toe</button>
    </div>

    <iframe id="appFrame" name="appFrame"></iframe>
</main>

<footer>
    <p>Készítők: Fülöp Martin EMD87F, Elek Dániel XZN3PZ</p>
</footer>

<script src="spa.js"></script>
</body>
</html>
