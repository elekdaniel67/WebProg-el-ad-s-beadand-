<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #0f0c29;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 10px;
            user-select: none;
        }

        h3 { color: #48868a; text-transform: uppercase; margin-bottom: 10px; }

        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .card {
            width: 70px;
            height: 70px;
            background: #1a1a1a;
            border: 2px solid #48868a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.3s;
            border-radius: 5px;
        }

        .card.flipped {
            background: #48868a;
            color: #0f0c29;
            transform: rotateY(180deg);
        }

        .card.matched {
            background: #24243e;
            border-color: #24243e;
            visibility: hidden; /* Eltűnik, ha megvan a pár */
        }

        #status { margin-top: 15px; font-weight: bold; color: #48868a; }
        
        button {
            margin-top: 15px;
            padding: 8px 15px;
            background: transparent;
            border: 1px solid #48868a;
            color: #48868a;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h3>⚽ Stadion Memória</h3>
    <div id="status">Párok száma: 0/4</div>
    <div class="game-container" id="grid"></div>
    <button onclick="resetGame()">ÚJ JÁTÉK</button>

    <script>
        const icons = ['⚽', '🏆', '👟', '🚩', '⚽', '🏆', '👟', '🚩'];
        let flippedCards = [];
        let matchedPairs = 0;
        let canFlip = true;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const shuffledIcons = shuffle([...icons]);
            
            shuffledIcons.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.dataset.index = index;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            card.innerText = card.dataset.icon;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                canFlip = false;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.icon === card2.dataset.icon) {
                matchedPairs++;
                document.getElementById('status').innerText = `Párok száma: ${matchedPairs}/4`;
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    flippedCards = [];
                    canFlip = true;
                    if (matchedPairs === 4) {
                        alert("Gratulálok! Minden párt megtaláltál!");
                        resetGame();
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerText = '';
                    card2.innerText = '';
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function resetGame() {
            matchedPairs = 0;
            flippedCards = [];
            canFlip = true;
            document.getElementById('status').innerText = "Párok száma: 0/4";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
