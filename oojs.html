<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <title>Stadion Start - OOJS Grafika</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #pitch-container {
            position: relative;
            width: 100%;
            height: 500px;
            background-color: #2e7d32; /* Fűszín */
            border: 5px solid #ffffff;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair;
            margin-top: 20px;
        }

        .instruction-overlay {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>
    </header>

    <nav>
        <a href="index.html">Főoldal</a>
        <a href="javascript.html">JavaScript CRUD</a>
        <a href="react.html">React CRUD</a>
        <a href="spa.html">SPA Menü</a>
        <a href="fetchapi.html">Fetch API</a>
        <a href="axios.html">Axios Menü</a>
        <a href="oojs.html" class="active">OOJS Menü</a>
    </nav>

    <main>
        <section class="hero">
            <h1>Objektumorientált Grafika</h1>
            <p>"Class-ok, öröklődés és a fizika találkozása a gyepen."</p>
        </section>
        <div id="pitch-container">
            <div class="instruction-overlay">Kattints a pályára a labdák kilövéséhez! ⚽</div>
        </div>
    </main>

    <footer>
        <p>Készítők: Fülöp Martin EMD87F, Elek Dániel XZN3PZ</p>
    </footer>

    <script>
        class sportsz {
            constructor(x, y, container) {
                this.x = x;
                this.y = y;
                this.container = container;
                this.element = document.createElement('div');
            }
            initPosition() {
                this.element.style.position = 'absolute';
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.fontSize = '30px';
                this.element.style.userSelect = 'none';
                this.element.innerHTML = '⚽';
                this.container.appendChild(this.element); 
            }
        }

        class labda extends sportsz {
            constructor(x, y, container) {
                super(x, y, container);
                this.size = 40;
                this.speedY = Math.random() * -10 - 5; 
                this.speedX = (Math.random() - 0.5) * 10;
                this.gravity = 0.4;
                this.bounce = -0.7;
                
                this.render();
            }
            render() {
                super.initPosition();
                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
            }

            update() {
                const rect = this.container.getBoundingClientRect();
                
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y + this.size > rect.height) {
                    this.y = rect.height - this.size;
                    this.speedY *= this.bounce;
                }

                if (this.x <= 0 || this.x + this.size >= rect.width) {
                    this.speedX *= -1;
                }

                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.transform = `rotate(${this.x * 2}deg)`;
            }
        }

        const container = document.getElementById('pitch-container');
        const balls = [];

        container.addEventListener('mousedown', (e) => {
            const rect = container.getBoundingClientRect();
            // A konténeren belüli relatív koordináták kiszámítása
            const mouseX = e.clientX - rect.left - 20;
            const mouseY = e.clientY - rect.top - 20;
            
            const newBall = new labda(mouseX, mouseY, container);
            balls.push(newBall);
        });

        function gameLoop() {
            balls.forEach(ball => ball.update());
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
