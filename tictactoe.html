<!DOCTYPE html>
<html>
<head>
    <style>
        .grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 5px; justify-content: center; }
        .cell { width: 80px; height: 80px; background: #0f0c29; border: 1px solid #48868a; color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body style="background: #1a1a1a; color: white; text-align: center;">
    <h3>Tic-Tac-Toe</h3>
    <div class="grid" id="board"></div>
    <script>
    let kör = "X";
        let allas = ["", "", "", "", "", "", "", "", ""];
        let akt = true;

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function createBoard() {
            const board = document.getElementById("board");
            board.innerHTML = "";
            allas.forEach((_, i) => {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.onclick = () => makeMove(cell, i);
                board.appendChild(cell);
            });
        }

        function makeMove(cell, i) {
            if (allas[i] !== "" || !akt) return;

            allas[i] = kör;
            cell.innerText = kör;
            
            checkWinner();
        }

        function checkWinner() {
            let gyoztes = false;
            let gy = [];

            for (let ok of winConditions) {
                const [a, b, c] = ok;
                if (allas[a] && allas[a] === allas[b] && allas[a] === allas[c]) {
                    gyoztes = true;
                    gy = ok;
                    break;
                }
            }

            if (gyoztes) {
                akt = false;
                gy.forEach(idx => document.getElementById("board").children[idx].classList.add("winner-cell"));
                
                setTimeout(() => {
                    alert("VÉGE A MECCSNEK! Győztes: " + kör);
                    reset();
                }, 300);
                return;
            }

            if (!allas.includes("")) {
                setTimeout(() => { alert("DÖNTETLEN!"); reset(); }, 300);
                return;
            }

            kör = kör === "X" ? "O" : "X";
            document.getElementById("status").innerText = kör + " JÖN";
        }

        function reset() {
            kör = "X";
            allas = ["", "", "", "", "", "", "", "", ""];
            akt = true;
            document.getElementById("status").innerText = "X JÖN";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
