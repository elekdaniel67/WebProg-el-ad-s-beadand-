<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <title>Stadion Start - JS CRUD</title>
    <link rel="stylesheet" href="style.css">
    <style>
            #form {
                background: #ffffff;
                padding: 25px;
                border-radius: 8px;
                margin-bottom: 30px;
                border: 1px solid #ddd;
                text-align: left;
                max-width: 600px;
                margin-left: auto;
                margin-right: auto;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }

            #form h3 {
                margin-top: 0;
                color: var(--elsodlegesszin);
                border-bottom: 2px solid var(--masodlagosszin);
                padding-bottom: 10px;
            }

            #form label {
                display: block;
                margin-top: 12px;
                font-weight: bold;
                color: var(--elsodlegesszin);
            }

            #form input {
                width: 100%;
                padding: 10px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
                font-size: 1rem;
            }

            button {
                margin-top: 15px;
                padding: 10px 25px;
                background-color: var(--elsodlegesszin);
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                transition: background 0.3s ease;
            }

            button:hover {
                background-color: var(--masodlagosszin);
                color: #000;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
                background: white;
            }

            th {
                background: var(--elsodlegesszin);
                color: white;
                padding: 15px;
                text-transform: uppercase;
                font-size: 0.85rem;
            }

            td {
                padding: 12px;
                border-bottom: 1px solid #ddd;
                text-align: left;
            }

            tr:nth-child(even) {
                background-color: #f9f9f9;
            }

            tr:hover {
                background-color: #f1f8f9;
            }

            .btn-table {
                padding: 5px 12px;
                font-size: 0.8rem;
                margin: 2px;
            }

            .delete-btn {
                background-color: #b62222;
            }

            .delete-btn:hover {
                background-color: #8b1a1a;
                color: white;
            }
    </style>
</head>
<body>

<header>
    <h1>Webprogramozás 1 – Labdarúgó CRUD</h1>
</header>

<nav>
    <a href="index.html">Főoldal</a>
    <a class="active" href="javascript.html">JavaScript CRUD</a>
    <a href="react.html">React CRUD</a>
    <a href="spa.html">SPA Menü</a>
    <a href="fetchapi.html">Fetch API</a>
    <a href="axios.html">Axios Menü</a>
    <a href="oojs.html">OOJS Menü</a>
</nav>

<main>
    <h2>Játékosok listája</h2>

    <div id="form">
        <h3 id="formCim">Új játékos hozzáadása</h3>

        <input type="hidden" id="editId">

        <label>Vezetéknév:</label>
        <input id="vezeteknev" placeholder="Pl. Haris">

        <label>Utónév:</label>
        <input id="utonev" placeholder="Pl. Attila">

        <label>Mezszám:</label>
        <input id="mezszam" type="number">

        <label>Érték (k€):</label>
        <input id="ertek" type="number">

        <button onclick="mentes()">Mentés</button>
        <button id="megse" onclick="formReset()" style="display:none; background: #666;">Mégse</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Vezetéknév</th>
                <th>Utónév</th>
                <th>Mez</th>
                <th>Érték</th>
                <th>Műveletek</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</main>

<footer>
    <p>Készítők: Fülöp Martin EMD87F, Elek Dániel XZN3PZ</p>
</footer>

</body>
</html>
